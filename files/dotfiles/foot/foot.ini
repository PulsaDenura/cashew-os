# -*- conf -*-
# Cashew-OS Foot Configuration

# shell=$SHELL (if set, otherwise user's default shell from /etc/passwd)
# term=foot (or xterm-256color if built with -Dterminfo=disabled)
term=foot
# login-shell=no

# app-id=foot # globally set wayland app-id. Default values are "foot" and "footclient" for desktop and server mode
# title=foot
# locked-title=no

font=monospace:size=11
dpi-aware=yes
# font=JetBrains Mono:size=11, monospace:size=11


# font-bold=<bold variant of regular font>
# font-italic=<italic variant of regular font>
# font-bold-italic=<bold+italic variant of regular font>
# font-size-adjustment=0.5
# line-height=<font metrics>
# letter-spacing=0
# horizontal-letter-offset=0
# vertical-letter-offset=0
# underline-offset=<font metrics>
# underline-thickness=<font underline thickness>
# strikeout-thickness=<font strikeout thickness>
# box-drawings-uses-font-glyphs=no
# gamma-correct-blending=no

# initial-color-theme=1
initial-window-size-chars=110x32  # reasonable starting size for most users
# initial-window-size-pixels=700x500  # Or,
# initial-window-mode=windowed

pad=8x8 center-when-maximized-and-fullscreen

# resize-by-cells=yes
# resize-keep-grid=yes
# resize-delay-ms=100

# bold-text-in-bright=no
word-delimiters=,â”‚`|:"'()[]{}<>
# selection-target=primary
# workers=<number of logical CPUs>
# utmp-helper=/usr/lib/utempter/utempter  # When utmp backend is â€˜libutempterâ€™ (Linux)
# utmp-helper=/usr/libexec/ulog-helper    # When utmp backend is â€˜ulogâ€™ (FreeBSD)

# uppercase-regex-insert=yes

[environment]
# name=value

[security]
osc52=enabled  # very useful for clipboard in ssh/tmux

[bell]
# system=yes
# urgent=no
# notify=no
# visual=no
# command=
# command-focused=no

[desktop-notifications]
# command=notify-send --wait --app-name ${app-id} --icon ${app-id} --category ${category} --urgency ${urgency} --expire-time ${expire-time} --hint STRING:image-path:${icon} --hint BOOLEAN:suppress-sound:${muted} --hint STRING:sound-name:${sound-name} --replace-id ${replace-id} ${action-argument} --print-id -- ${title} ${body}
# command-action-argument=--action ${action-name}=${action-label}
# close=""
# inhibit-when-focused=yes

[scrollback]
lines=12000          # much more useful default
# multiplier=3.0
# indicator-position=relative
# indicator-format=""

[url]
# launch=xdg-open ${url}
# label-letters=sadfjklewcmpgh
# osc8-underline=url-mode
# regex=(((https?://|mailto:|ftp://|file:|ssh:|ssh://|git://|tel:|magnet:|ipfs://|ipns://|gemini://|gopher://|news:)|www\.)([0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]+|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*'))

[cursor]
style=block
blink=yes
# blink-rate=500
# beam-thickness=1.5
# underline-thickness=<font underline thickness>

[mouse]
hide-when-typing=yes   # Better for laptop work
alternate-scroll-mode=yes   # very useful when inside ssh/tmux/vim

[touch]
# long-press-delay=400

[colors]
alpha=0.92
background=222020
foreground=e0e0e0


## Normal/regular colors (color palette 0-7)
regular0=45475a    # black
regular1=f38ba8    # red
regular2=a6e3a1    # green
regular3=f9e2af    # yellow
regular4=89b4fa    # blue
regular5=f5c2e7    # magenta
regular6=94e2d5    # cyan
regular7=ccd0da    # white

## Bright colors (color palette 8-15)
bright0=585b70     # bright black
bright1=f38ba8     # bright red
bright2=a6e3a1     # bright green
bright3=f9e2af     # bright yellow
bright4=89b4fa     # bright blue
bright5=f5c2e7     # bright magenta
bright6=94e2d5     # bright cyan
bright7=ffffff     # bright white

[csd]
preferred=none
size=24
hide-when-maximized=yes
border-width=1

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert
search-start=Control+Shift+r  # Essential for power users
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
show-urls-launch=Control+Shift+o

[search-bindings]
# cancel=Control+g Control+c Escape
# commit=Return KP_Enter

[url-bindings]
# cancel=Control+g Control+c Control+d Escape
# toggle-url-visible=t

[text-bindings]
# \x03=Mod4+c  # Map Super+c -> Ctrl+c

[mouse-bindings]
font-increase=Control+BTN_WHEEL_BACK
font-decrease=Control+BTN_WHEEL_FORWARD

