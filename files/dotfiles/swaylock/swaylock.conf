image=/usr/share/backgrounds/lockscreen.jxl
scaling=fill
font=monospace
font-size=24

ignore-empty-password
show-caps-lock
show-keyboard-layout


indicator-radius=100
indicator-thickness=10
line-uses-inside


# --- General Appearance ---
color=1a1b26
indicator-radius=100
indicator-thickness=10
line-uses-inside

# --- Colors: Inside (The circle center) ---
# Keeping it dark and deep
inside-color=1a1b26
inside-clear-color=1a1b26
inside-ver-color=1a1b26
inside-wrong-color=1a1b26

# --- Colors: Ring (The outer border) ---
# Normal state is your light blue border color
ring-color=7aa2f7
ring-clear-color=3d59a1
ring-ver-color=0db9d7
ring-wrong-color=ff5555   # Standard cold red for errors (unavoidable outlier)

# --- Colors: Text ---
# Off-white blueish tint
text-color=c0caf5
text-clear-color=c0caf5
text-ver-color=0db9d7
text-wrong-color=ff5555

# --- Colors: Highlights (The 'typing' segments) ---
# Making the typing flashes your border blue
key-hl-color=7aa2f7
bs-hl-color=3d59a1
separator-color=1a1b26